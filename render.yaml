services:
  - type: web
    name: pd-detection-backend
    runtime: python
    region: oregon
    plan: free

    buildCommand: >
      pip install --upgrade pip &&
      pip install --extra-index-url https://download.pytorch.org/whl/cpu -r requirements.txt

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /api/health

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10

      - key: ENVIRONMENT
        value: production

      - key: DEBUG
        value: "false"

      - key: MODEL_CACHE_DIR
        value: /tmp/pd_models

      # Configure these in the Render Dashboard (Environment),
      # not in this file:
      #
      # SUPABASE_URL
      # SUPABASE_SERVICE_KEY
      # GEMINI_API_KEY
      # HF_TOKEN
      # HF_MODEL_REPO
      # ALLOWED_ORIGINS