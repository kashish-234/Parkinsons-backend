services:
  - type: web
    name: pd-detection-backend
    runtime: python
    region: oregon
    plan: free
    pythonVersion: "3.11.10"

    buildCommand: >
      pip install --upgrade pip &&
      pip install --extra-index-url https://download.pytorch.org/whl/cpu -r requirements.txt

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /api/health

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: MODEL_CACHE_DIR
        value: /tmp/pd_models